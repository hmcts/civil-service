sonarqube {
  properties {
    property "sonar.projectName", "CIVIL :: service"
    property "sonar.projectKey", "civil-service"
    property "sonar.coverage.jacoco.xmlReportPaths", "${projectDir}/build/reports/jacoco/test/jacocoTestReport.xml"
    property "sonar.exclusions", sonarExclusions.join(", ")
    property "sonar.gradle.skipCompile", "true"
    property "sonar.branch.cache.enabled", "true"
    property "sonar.working.directory", layout.buildDirectory.dir("sonar").get().asFile
  }
}


tasks.named('jacocoTestReport') {
  dependsOn tasks.named('test')
  dependsOn subprojects.collect { it.tasks.named('test') }
  executionData(layout.buildDirectory.file("jacoco/test.exec").get().asFile)
  executionData(subprojects.collect { it.layout.buildDirectory.file("jacoco/test.exec").get().asFile })
  executionData(layout.buildDirectory.file("jacoco/integration.exec").get().asFile)
  mustRunAfter integration
  subprojects.each {
    sourceSets it.sourceSets.main
  }
  reports {
    xml.getRequired().set(true)
    csv.getRequired().set(false)
    xml.outputLocation = layout.buildDirectory.file("reports/jacoco/test/jacocoTestReport.xml")
  }
}

ext.libraries = [
  junit5: [
    "org.junit.jupiter:junit-jupiter-api:${versions.junit}",
    "org.junit.jupiter:junit-jupiter-engine:${versions.junit}",
    "org.junit.jupiter:junit-jupiter-params:${versions.junit}",
    "org.junit.platform:junit-platform-commons:${versions.junitPlatform}",
    "org.junit.platform:junit-platform-engine:${versions.junitPlatform}"
  ]
]

allprojects {
  configurations.configureEach {
    resolutionStrategy.eachDependency { details ->
      if (details.requested.group == 'org.projectlombok') {
        details.useVersion versions.lombok
      }
      if (details.requested.group == 'io.netty') {
        if (details.requested.name in [
          'netty-buffer', 'netty-codec', 'netty-codec-dns',
          'netty-codec-http', 'netty-codec-http2', 'netty-codec-socks',
          'netty-common', 'netty-handler', 'netty-handler-proxy',
          'netty-resolver', 'netty-resolver-dns', 'netty-resolver-dns-classes-macos',
          'netty-resolver-dns-native-macos',
          'netty-transport', 'netty-transport-classes-epoll',
          'netty-transport-classes-kqueue', 'netty-transport-native-epoll',
          'netty-transport-native-kqueue', 'netty-transport-native-unix-common'
        ]) {
          details.useVersion('4.1.129.Final')
          details.because('CVE-2025-25193, CVE-2025-67735')
        }
      }
      if (details.requested.group == 'org.apache.logging.log4j') {
        details.useVersion('2.25.3')
        details.because('CVE-2025-68161 vendor recommended version')
      }
    }
    exclude group: 'org.springframework.security', module: 'spring-security-rsa'
    exclude group: 'org.projectlombok', module: 'lombok-mapstruct-binding'
  }
}

