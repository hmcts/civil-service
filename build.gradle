  testImplementation "org.testcontainers:junit-jupiter:${versions.testcontainers}"
  testImplementation "com.h2database:h2:2.4.240"

  contractTestImplementation 'au.com.dius.pact.consumer:junit5:4.6.17'
  contractTestImplementation 'au.com.dius.pact.provider:junit5:4.6.17'
  contractTestImplementation 'au.com.dius.pact.provider:junit5spring:4.6.17'
  contractTestImplementation "org.hamcrest:java-hamcrest:2.0.0.0"
  contractTestImplementation('org.junit.jupiter:junit-jupiter-api:5.14.4')
  contractTestImplementation('org.junit.jupiter:junit-jupiter-engine:5.14.4')

  contractTestImplementation sourceSets.main.runtimeClasspath
  contractTestImplementation sourceSets.test.runtimeClasspath

  integrationTestImplementation('org.junit.jupiter:junit-jupiter-api:5.14.4')
  integrationTestImplementation('org.junit.jupiter:junit-jupiter-engine:5.14.4')

  integrationTestImplementation sourceSets.main.runtimeClasspath
  integrationTestImplementation sourceSets.test.runtimeClasspath

  implementation('com.opencsv:opencsv:5.12.0') {
    exclude group: 'commons-collections', module: 'commons-collections'
  }
}

application {
  mainClass = 'uk.gov.hmcts.reform.civil.Application'
}

bootJar {
  getArchiveFileName().set(provider {
    'civil-service.jar'
  })

  manifest {
    attributes('Implementation-Version': project.version.toString())
  }
}

wrapper {
  distributionType = Wrapper.DistributionType.ALL
}

project.ext {
  pactVersion = getCheckedOutGitCommitHash()
}

def pactBrokerUrl = System.getenv("PACT_BROKER_FULL_URL") ?: 'http://localhost:80'

pact {
  broker = new Broker()
  broker.pactBrokerUrl = pactBrokerUrl

  publish = new PactPublish()
  publish.pactDirectory = 'pacts'
  publish.pactBrokerUrl = pactBrokerUrl
  publish.tags = [System.getenv("PACT_BRANCH_NAME") ?: 'Dev']
  publish.consumerBranch = System.getenv("PACT_BRANCH_NAME") ?: 'Dev'
  publish.consumerVersion = project.pactVersion
}

tasks.register('contract', Test) {
  group = 'Delivery pipeline'
  description = 'Runs the consumer Pact tests'
  setTestClassesDirs(sourceSets.contractTest.output.classesDirs)
  setClasspath(sourceSets.contractTest.runtimeClasspath)
  useJUnitPlatform()
  systemProperty 'pact.rootDir', "pacts"
}

tasks.register('runAndPublishConsumerPactTests', Test) {
  dependsOn(contract)
  logger.lifecycle("Runs pact Tests")
  testClassesDirs = sourceSets.contractTest.output.classesDirs
  classpath = sourceSets.contractTest.runtimeClasspath
  finalizedBy(pactPublish)
}

tasks.register('providerContractTests', Test) {
  description = 'Runs ONLY the provider Pact verification tests.'
  group = 'Verification'

  useJUnitPlatform()
  testClassesDirs = sourceSets.contractTest.output.classesDirs
  classpath = sourceSets.contractTest.runtimeClasspath
  include '**/provider/**'
}

tasks.register('runProviderPactVerification') {
  description = 'Entry point for Jenkins to run provider contract tests.'
  group = 'Verification'

  dependsOn tasks.named('providerContractTests')
}

tasks.withType(Test).configureEach { t ->
  doFirst {
    logger.lifecycle("Available Processors for ${t.name}: ${Runtime.runtime.availableProcessors()}")
  }
  useJUnitPlatform()

  maxParallelForks = Runtime.runtime.availableProcessors() - 1 ?: 1
  jvmArgs '-Xshare:off'
  // Use Parallel GC for faster, short-lived test forks
  jvmArgs '-XX:+UseParallelGC'

  // Keep within typical Jenkins container limits
  minHeapSize = "256m"
  maxHeapSize = "1536m"
  jvmArgs "-XX:MaxMetaspaceSize=512m"
  jvmArgs '-XX:ReservedCodeCacheSize=512m'
  // Temurin 21.0.7 occasionally crashes in C2 (BoolNode::Ideal SIGSEGV); stay on C1 until upstream fix.
  jvmArgs "-XX:TieredStopAtLevel=1"

  testLogging {
    exceptionFormat = 'full'
    showCauses = true
    showExceptions = true
    showStackTraces = true
    showStandardStreams = false
    events "failed", "skipped"
  }

  if (project.hasProperty('pact.verifier.publishResults')) {
    systemProperty 'pact.verifier.publishResults', project.property('pact.verifier.publishResults')
  }
  if (project.hasProperty('pact.provider.version')) {
    systemProperty 'pact.provider.version', project.property('pact.provider.version')
  } else {
    systemProperty 'pact.provider.version', project.pactVersion
  }

  if (project.hasProperty('pact.provider.branch')) {
    systemProperty 'pact.provider.branch', project.property('pact.provider.branch')
  } else {
    systemProperty 'pact.provider.branch', System.getenv("PACT_BRANCH_NAME") ?: "Dev"
  }
}

static def getCheckedOutGitCommitHash() {
  'git rev-parse --verify --short HEAD'.execute().text.trim()
}

publishing {
  repositories {
    maven {
      name = "AzureArtifacts"
      url = uri("https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/maven/v1")
      credentials {
        username = System.getenv("AZURE_DEVOPS_ARTIFACT_USERNAME")
        password = System.getenv("AZURE_DEVOPS_ARTIFACT_TOKEN")
      }
    }
  }
}
