import au.com.dius.pact.provider.gradle.Broker
import au.com.dius.pact.provider.gradle.PactPublish

plugins {
  id 'application'
  id 'checkstyle'
  id 'jacoco'
  id 'io.spring.dependency-management' version '1.1.7'
  id 'org.springframework.boot' version '3.3.7'
  id 'org.owasp.dependencycheck' version '12.2.1'
  id 'com.github.ben-manes.versions' version '0.54.0'
  id 'org.sonarqube' version '6.3.1.5724'
  id 'au.com.dius.pact' version '4.6.17'
  id "io.freefair.lombok" version "8.14.4"
  id "org.flywaydb.flyway" version "10.22.0"
  id 'maven-publish'
  id "org.gradle.test-retry" version "1.6.4"
}

group = 'uk.gov.hmcts.reform'
version = '0.0.1'

def versions = [
  junit             : '5.14.4',
  junitPlatform     : '1.14.4',
  springBoot        : springBoot.class.package.implementationVersion,
  springStatemachine: '4.0.0',
  lombok            : '1.18.38',
  camunda           : '7.20.0',
  testcontainers    : '1.21.4',
  pdfbox            : '3.0.7',
  tika              : '3.3.0'
]

allprojects {
  apply plugin: 'java'
  apply plugin: 'jacoco'
  apply plugin: 'checkstyle'
  apply plugin: 'io.spring.dependency-management'
  apply plugin: 'org.springframework.boot'
  apply plugin: 'org.owasp.dependencycheck'
  apply plugin: 'com.github.ben-manes.versions'

  java {
    toolchain {
      languageVersion = JavaLanguageVersion.of(21)
    }
  }

  checkstyle {
    maxWarnings = 0
    toolVersion = '13.4.1'
    getConfigDirectory().set(new File(rootDir, 'config/checkstyle'))
    ignoreFailures = System.getenv('CHECKSTYLE_SKIP') == 'true'
  }

  tasks.withType(Checkstyle).configureEach {
    reports {
      xml.required = false
      html.required = true
    }
  }

  dependencyCheck {
    failBuildOnCVSS = System.getProperty('dependencyCheck.failBuild') == 'true' ? 0 : 11
    suppressionFile = 'config/owasp/suppressions.xml'

    analyzers.assemblyEnabled = false
    analyzers.retirejs.enabled = false
    analyzers.ossIndex.enabled = false
  }

  dependencyManagement {
    dependencies {
      //CVE-2018-10237 - Unbounded memory allocation
      dependencySet(group: 'com.google.guava', version: '33.6.0-jre') {
        entry 'guava'
      }

      dependency 'com.squareup.okhttp3:okhttp:5.3.2'

      dependency 'org.slf4j:slf4j-nop:2.0.17'

      dependencySet(group: 'org.apache.httpcomponents.core5', version: '5.4.2') {
        entry 'httpcore5'
        entry 'httpcore5-h2'
      }

    }
    imports {
      mavenBom 'org.springframework.cloud:spring-cloud-dependencies:2023.0.6'
      mavenBom "com.azure.spring:spring-cloud-azure-dependencies:5.24.1"
    }
  }

  configurations {
    testCompile.exclude group: 'ch.qos.logback', module: 'logback-classic'
  }

  repositories {
    mavenLocal()
    mavenCentral()
    maven {
      url = uri("https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/maven/v1")
    }
  }
}

sourceSets {
  integrationTest {
    java {
      compileClasspath += main.output
      runtimeClasspath += main.output
      srcDir file('src/integrationTest/java')
    }
    resources.srcDir file('src/integrationTest/resources')
  }

  contractTest {
    java {
      compileClasspath += main.output
      runtimeClasspath += main.output
      srcDir file('src/contractTest/java')
    }
    resources.srcDir file('src/contractTest/resources')
  }
}

tasks.withType(JavaCompile).configureEach {
  options.compilerArgs << "-Xlint:unchecked" << "-Xlint:-removal" << "-Werror"
}

tasks.named('test', Test) {
  failFast = true
}

tasks.withType(Copy).configureEach {
  duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

def integration = tasks.register('integration', Test) {
  maxHeapSize = '3G'
  description = "Runs integration tests"
  group = "Verification"
  testClassesDirs = sourceSets.integrationTest.output.classesDirs
  classpath = sourceSets.integrationTest.runtimeClasspath
  failFast = System.getenv('GITHUB_ACTIONS') != 'true'
  testLogging.showStandardStreams = false

  if (System.getenv('GITHUB_ACTIONS') == 'true') {
    retry {
      maxRetries = 3
      maxFailures = 10
      failOnPassedAfterRetry = false
    }
  }
}

tasks.register('fortifyScan', JavaExec) {
  description = 'Run fortify scan.'
  mainClass.set("uk.gov.hmcts.fortifyclient.FortifyClientMainApp")
  classpath += sourceSets.test.runtimeClasspath
  jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
}

static def dataSetupBranch(String envName) {
  System.getenv(envName) ?: 'master'
}

static def isPreviewEnvironment() {
  System.getenv('ENVIRONMENT') == 'preview'
}

static def isHighLevelDataSetupEnvironment() {
  System.getenv('ENVIRONMENT') in ['preview', 'aat']
}

static def isCamundaImportEnabled() {
  def camundaBaseUrl = System.getenv('CAMUNDA_BASE_URL')
  camundaBaseUrl != null && !camundaBaseUrl.trim().isEmpty()
}

static def isCommonAatCcdSetupSkipped() {
  System.getenv('ENVIRONMENT') == 'aat' && Boolean.parseBoolean(System.getenv('SKIP_COMMON_AAT_CCD_SETUP'))
}

static def isNightlyRun() {
  System.getenv('NIGHTLY_RUN') == 'true'
}

def pullLatestCivilCcdDefinitions = tasks.register('pullLatestCivilCcdDefinitions', Exec) {
  description = 'Pulls the civil CCD definition repository branch needed for data setup.'
  onlyIf { isHighLevelDataSetupEnvironment() && !isCommonAatCcdSetupSkipped() }
  doFirst {
    commandLine './bin/pull-latest-civil-ccd-files.sh', dataSetupBranch('CCD_DEFINITION_BRANCH')
  }
}

def pullLatestCivilCamundaDefinitions = tasks.register('pullLatestCivilCamundaDefinitions', Exec) {
  description = 'Pulls the civil Camunda BPMN definition repository branch needed for data setup.'
  onlyIf { isHighLevelDataSetupEnvironment() && isCamundaImportEnabled() }
  doFirst {
    commandLine './bin/pull-latest-camunda-files.sh', dataSetupBranch('CAMUNDA_DEFINITION_BRANCH')
  }
}

def pullLatestCivilWaDmnDefinitions = tasks.register('pullLatestCivilWaDmnDefinitions', Exec) {
  description = 'Pulls the civil WA DMN definition repository branch needed for data setup.'
  onlyIf { isHighLevelDataSetupEnvironment() && isCamundaImportEnabled() }
  doFirst {
    commandLine './bin/pull-latest-dmn-files.sh', dataSetupBranch('DMN_DEFINITION_BRANCH')
  }
}

def pullLatestCivilWiremockMappings = tasks.register('pullLatestCivilWiremockMappings', Exec) {
  description = 'Pulls the civil WireMock mappings repository branch needed for preview data setup.'
  onlyIf { isPreviewEnvironment() }
  doFirst {
    commandLine './bin/pull-latest-wiremock-mappings.sh', dataSetupBranch('WIREMOCK_MAPPINGS_BRANCH')
  }
}

def buildCcdDefinitionsXls = tasks.register('buildCcdDefinitionsXls', Exec) {
  description = 'Builds CCD XLS definitions.'
  onlyIf { isHighLevelDataSetupEnvironment() && !isCommonAatCcdSetupSkipped() }
  dependsOn pullLatestCivilCcdDefinitions
  doFirst {
    def dataSetupEnvironment = System.getenv('ENVIRONMENT')
    if (!(dataSetupEnvironment in ['preview', 'aat'])) {
      throw new GradleException("ENVIRONMENT must be one of: preview, aat")
    }

    if (isPreviewEnvironment()) {
      def changeId = System.getenv('CHANGE_ID')
      if (!changeId) {
        throw new GradleException("CHANGE_ID must be set when ENVIRONMENT=preview")
      }
      environment 'CCD_DEF_CASE_SERVICE_BASE_URL', "http://civil-service-pr-${changeId}-java"
      environment 'CCD_DEF_GEN_APP_SERVICE_BASE_URL', "http://civil-service-pr-${changeId}-java"
    } else {
      def aatCivilServiceUrl = 'http://civil-service-aat.service.core-compute-aat.internal'
      environment 'CCD_DEF_CASE_SERVICE_BASE_URL',
        System.getenv('CCD_DEF_CASE_SERVICE_BASE_URL') ?: aatCivilServiceUrl
      environment 'CCD_DEF_GEN_APP_SERVICE_BASE_URL',
        System.getenv('CCD_DEF_GEN_APP_SERVICE_BASE_URL') ?: aatCivilServiceUrl
    }

    commandLine './bin/build-civil-xlsx-definitions.sh', dataSetupEnvironment
  }
}

def camundaHighLevelDataSetup = tasks.register('camundaHighLevelDataSetup', JavaExec) {
  description = 'Imports civil Camunda BPMN and WA DMN definitions using the high-level data setup flow.'
  onlyIf { isHighLevelDataSetupEnvironment() && isCamundaImportEnabled() }
  dependsOn pullLatestCivilCamundaDefinitions, pullLatestCivilWaDmnDefinitions
  mainClass.set("uk.gov.hmcts.reform.civil.setup.CamundaHighLevelDataSetupApp")
  classpath += sourceSets.main.runtimeClasspath
  jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
}

def loadCivilWiremockMappings = tasks.register('loadCivilWiremockMappings', Exec) {
  description = 'Loads civil WireMock mappings into the preview WireMock service.'
  onlyIf { isPreviewEnvironment() }
  dependsOn pullLatestCivilWiremockMappings
  commandLine './bin/load-wiremock-mappings.sh'
}

tasks.register('highLevelDataSetup', JavaExec) {
  description = 'Loads roles, CCD definitions, Camunda BPMNs, WA DMNs and preview WireMock mappings using the high-level data setup flow.'
  onlyIf { isHighLevelDataSetupEnvironment() && !isCommonAatCcdSetupSkipped() }
  dependsOn buildCcdDefinitionsXls, camundaHighLevelDataSetup, loadCivilWiremockMappings
  mainClass.set("uk.gov.hmcts.reform.civil.setup.HighLevelDataSetupApp")
  classpath += sourceSets.main.runtimeClasspath
  jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
}

def waitForCivilService = tasks.register('waitForCivilService', Exec) {
  description = 'Awaits until civil-service is ready.'
  commandLine './bin/wait-for.sh'
}

def waitForManageCase = tasks.register('waitForManageCase', Exec) {
  description = 'Awaits until manage-case is ready.'
  mustRunAfter waitForCivilService
  commandLine './bin/wait-for.sh', 'manage-case'
}

def awaitApplicationReadiness = tasks.register('awaitApplicationReadiness') {
  description = 'Awaits until application dependencies are ready.'
  dependsOn waitForCivilService, waitForManageCase
}

def installSmokeTestDependencies = tasks.register('installSmokeTestDependencies', Exec) {
  description = 'Installs dependencies needed to run smoke tests.'
  commandLine '/usr/bin/yarn', 'install', '--immutable', '--silent'
}

def runSmokeTests = tasks.register('runSmokeTests', Exec) {
  description = 'Runs smoke tests.'
  dependsOn installSmokeTestDependencies
  mustRunAfter awaitApplicationReadiness
  commandLine '/usr/bin/yarn', '--silent', 'run', 'test:civil-service-smoke'
}

tasks.register('smoke') {
  description = 'Runs the smoke tests.'
  dependsOn awaitApplicationReadiness, runSmokeTests
}

// Functional test tasks
def runApiTests = tasks.register('runApiTests', Exec) {
  description = 'Runs Prod features in functional tests.'
  onlyIf {
    !isNightlyRun()
  }
  commandLine './bin/run-api-tests.sh'
}

def runNightlyApiTests = tasks.register('runNightlyApiTests', Exec) {
  description = 'Runs nightly tests.'
  onlyIf {
    isNightlyRun()
  }
  commandLine './bin/run-nightly-api-tests.sh'
}

runNightlyApiTests.configure {
  mustRunAfter awaitApplicationReadiness
}

runApiTests.configure {
  mustRunAfter runNightlyApiTests
}

tasks.register('functional') {
  description = 'Runs the functional tests.'
  dependsOn awaitApplicationReadiness, runNightlyApiTests, runApiTests
}

tasks.named('sonarqube') {
  dependsOn tasks.named('test'), tasks.named('jacocoTestReport')
