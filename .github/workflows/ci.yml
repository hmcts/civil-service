name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - refs/tags/*
    tags:
      - '*'

jobs:
  pii-log-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Semgrep
        run: python -m pip install semgrep==1.136.0
      - name: Test PII logging rules
        run: semgrep test .semgrep
      - name: Scan changed application code for PII logging
        env:
          SEMGREP_BASELINE_COMMIT: ${{ github.event.pull_request.base.sha }}
        run: |
          semgrep scan --strict --metrics=off --no-rewrite-rule-ids \
            --config .semgrep/logging-pii.yml \
            --json-output semgrep-results.json \
            src/main
          python .semgrep/annotate.py semgrep-results.json

  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.workers.max=2
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: cmc
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up Cache
        uses: actions/cache@v6
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Run checks
        run: ./gradlew check
      - name: Run integration tests
        env:
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cmc
          SPRING_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/cmc
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: ./gradlew integration
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: integration-tests-results
          path: build/reports/tests/integration
